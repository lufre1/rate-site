server {
    listen 80;
    server_name _;  # CHANGE TO YOUR DOMAIN (e.g. mensa.example.com)

    # Use Docker DNS for runtime hostname resolution
    resolver 127.0.0.11 valid=10s;

    # API proxy — strips /api prefix before proxying to backend
    location ~ ^/api/(.*) {
        proxy_pass http://backend:8000/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
}
